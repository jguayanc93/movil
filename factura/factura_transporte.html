<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/styles/factura-components.css">
    <title>Gestionar Transportista - Factura</title>    
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Transportista</h1>
                    <p class="text-sm text-gray-500 mt-1">Asigna o modifica el transportista de la factura</p>
                </div>
                <a href="/main.html" class="inline-flex items-center justify-center rounded-lg bg-indigo-600 px-6 py-2.5 text-base font-medium text-white shadow-sm hover:bg-indigo-700 transition-colors">
                    ← Volver
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Paso 1: Búsqueda de Factura -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6 sm:p-8">
            <div class="flex items-center mb-6">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-indigo-600 text-white font-bold">1</div>
                <h2 class="ml-3 text-xl font-semibold text-gray-900">Buscar Factura</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-end">
                <div class="sm:col-span-3">
                    <label for="leer" class="block text-sm font-medium text-gray-700 mb-2">Número de Factura o Boleta</label>
                    <input type="search" id="leer" placeholder="Ej: 12345 o FAC-2024-001" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                </div>
                <div>
                    <button id="enviar2" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.5 5.5a7.5 7.5 0 0010.5 10.5z" />
                        </svg>
                        <span class="hidden sm:inline">Buscar</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Paso 2: Transportista Actual -->
        <div id="paso2" class="mb-8 bg-white rounded-lg shadow-md p-6 sm:p-8 opacity-50 pointer-events-none transition-opacity duration-300">
            <div class="flex items-center mb-6">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-indigo-600 text-white font-bold">2</div>
                <h2 class="ml-3 text-xl font-semibold text-gray-900">Transportista Actual</h2>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">🚚 Transportista Asignado</label>
                    <div id="transportista-display" class="px-4 py-3 bg-gradient-to-r from-purple-50 to-purple-100 border-2 border-purple-200 rounded-lg text-purple-900 font-medium min-h-12 flex items-center">
                        <span class="text-gray-400">Busca una factura para cargar esta información</span>
                    </div>
                    <p id="transportista" class="hidden"></p>
                </div>
            </div>
        </div>

        <!-- Paso 3: Nuevo Transportista -->
        <div id="paso3" class="mb-8 bg-white rounded-lg shadow-md p-6 sm:p-8 opacity-50 pointer-events-none transition-opacity duration-300">
            <div class="flex items-center mb-6">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-green-600 text-white font-bold">3</div>
                <h2 class="ml-3 text-xl font-semibold text-gray-900">Asignar Nuevo Transportista</h2>
            </div>
            
            <div class="space-y-4">
                <!-- Campo de búsqueda -->
                <div class="relative">
                    <label for="transportista2" class="block text-sm font-medium text-gray-700 mb-2">Nuevo Transportista</label>
                    <input type="search" id="transportista2" placeholder="Escribe para buscar transportista..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" disabled />
                    <p class="text-xs text-gray-500 mt-1">💡 Escribe para buscar entre los transportistas disponibles</p>
                    
                    <!-- Dropdown de resultados -->
                    <div id="resultados-transportistas" class="absolute z-10 w-full mt-2 bg-white border border-gray-300 rounded-lg shadow-lg hidden max-h-48 overflow-y-auto">
                        <!-- Se llenará dinámicamente -->
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="flex gap-3 pt-4">
                    <button id="btn-cancelar" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-lg transition-colors" disabled>
                        Cancelar
                    </button>
                    <button id="btn-aceptar" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition-colors" disabled>
                        Aceptar Cambio
                    </button>
                </div>

                <!-- Información seleccionada -->
                <div id="info-seleccionada" class="hidden bg-green-50 border-l-4 border-green-500 p-4 rounded">
                    <p class="text-sm text-green-700">
                        <span class="font-semibold">✓ Seleccionado:</span> <span id="nombre-transportista-seleccionado">-</span>
                    </p>
                </div>

                <input type="hidden" id="codigo-transportista" value="">
            </div>
        </div>
    </main>

    <!-- Hidden table for old structure -->
    <div id="aparecer" class="hidden">
        <table>
            <tbody id="recorrer"></tbody>
        </table>        
    </div>

    <script src="/caminos/rutas.js"></script>
    <script src="/js/global/variables.js"></script>
    <script src="/js/global/toast-notifications.js"></script>
    <script src="/js/funciones/fac_modificar.js"></script>
    <script src="/js/factura/identificar.js"></script>
    <script src="/js/funciones/transportista.js"></script>

    <script>
        // ===============================================
        // VARIABLES GLOBALES
        // ===============================================
        let transportistaSeleccionado = {
            codigo: null,
            nombre: null
        };

        // ===============================================
        // INICIALIZACIÓN: Deshabilitar Pasos 2 y 3
        // ===============================================
        window.addEventListener('DOMContentLoaded', function() {
            deshabilitarPasos();
        });

        function deshabilitarPasos() {
            document.getElementById('paso2').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('paso3').classList.add('opacity-50', 'pointer-events-none');
        }

        function habilitarPasos() {
            document.getElementById('paso2').classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('paso3').classList.remove('opacity-50', 'pointer-events-none');
        }

        // ===============================================
        // PASO 1: BÚSQUEDA DE FACTURA
        // ===============================================
        // El script identificar.js ya maneja enviar2
        // Necesitamos interceptar cuando se completa la búsqueda

        // Ejecutar después de que identificar.js complete la búsqueda
        const observerTransportista = new MutationObserver((mutations) => {
            for (let mutation of mutations) {
                if (mutation.type === 'childList' || mutation.type === 'characterData') {
                    const transportistaActual = document.getElementById('transportista').textContent.trim();
                    if (transportistaActual) {
                        // La búsqueda completó, habilitar pasos 2 y 3
                        habilitarPasos();
                        habilitarCampoTransportista();
                        mostrarTransportistaActual(transportistaActual);
                        return;
                    }
                }
            }
        });

        const transportistaElement = document.getElementById('transportista');
        observerTransportista.observe(transportistaElement, {
            childList: true,
            characterData: true,
            subtree: true
        });

        // ===============================================
        // PASO 2: MOSTRAR TRANSPORTISTA ACTUAL
        // ===============================================
        function mostrarTransportistaActual(nombre) {
            const displayElement = document.getElementById('transportista-display');
            if (nombre && nombre !== '') {
                displayElement.innerHTML = `<span class="text-purple-900 font-semibold">🚚 ${nombre}</span>`;
            }
        }

        // ===============================================
        // PASO 3: BÚSQUEDA Y SELECCIÓN DE TRANSPORTISTA
        // ===============================================
        const inputTransportista = document.getElementById('transportista2');
        const resultadosContainer = document.getElementById('resultados-transportistas');
        const btnAceptar = document.getElementById('btn-aceptar');
        const btnCancelar = document.getElementById('btn-cancelar');
        const infoSeleccionada = document.getElementById('info-seleccionada');

        function habilitarCampoTransportista() {
            inputTransportista.disabled = false;
        }

        // Evento de búsqueda mientras escribe
        inputTransportista.addEventListener('input', async function(e) {
            const valor = this.value.trim();
            
            if (valor.length < 1) {
                resultadosContainer.classList.add('hidden');
                return;
            }

            // Usar la función get_transportista del script transportista.js
            await buscarTransportistas(valor);
        });

        async function buscarTransportistas(busqueda) {
            try {
                let dataenviar = {};
                dataenviar.sugerencia = busqueda;
                
                let fetchobj = {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    mode: "cors",
                    credentials: "include",
                    body: JSON.stringify(dataenviar)
                };

                const respuesta = await fetch(rutafacturacambiotransportista, fetchobj);
                const resultado = respuesta.ok ? await respuesta.json() : await respuesta.text();
                const datos = typeof resultado === 'string' ? JSON.parse(resultado) : resultado;

                // Limpiar resultados previos
                resultadosContainer.innerHTML = '';

                if (Array.isArray(datos) && datos.length > 0) {
                    resultadosContainer.classList.remove('hidden');
                    
                    datos.forEach(item => {
                        const codigo = item[0];
                        const nombre = item[1];
                        
                        const div = document.createElement('div');
                        div.className = 'px-4 py-2.5 hover:bg-indigo-100 cursor-pointer border-b border-gray-200 last:border-b-0 transition-colors';
                        div.innerHTML = `<div class="font-medium text-gray-800">${nombre}</div>`;
                        
                        div.addEventListener('click', function() {
                            seleccionarTransportista(codigo, nombre);
                        });
                        
                        resultadosContainer.appendChild(div);
                    });
                } else {
                    resultadosContainer.classList.add('hidden');
                }
            } catch (err) {
                console.error('Error al buscar transportistas:', err);
                toast.error('Error al buscar transportistas');
            }
        }

        function seleccionarTransportista(codigo, nombre) {
            transportistaSeleccionado.codigo = codigo;
            transportistaSeleccionado.nombre = nombre;
            
            inputTransportista.value = nombre;
            resultadosContainer.classList.add('hidden');
            
            // Mostrar información seleccionada
            document.getElementById('nombre-transportista-seleccionado').textContent = nombre;
            infoSeleccionada.classList.remove('hidden');
            
            // Habilitar botones
            btnAceptar.disabled = false;
            btnCancelar.disabled = false;
        }

        // ===============================================
        // BOTONES DE ACCIÓN
        // ===============================================
        btnCancelar.addEventListener('click', function() {
            limpiarFormulario();
        });

        btnAceptar.addEventListener('click', async function() {
            if (!transportistaSeleccionado.codigo) {
                toast.warning('Por favor, selecciona un transportista');
                return;
            }

            // Usar la función preparado de fac_modificar.js
            // preparado(sustituto, indice, doc)
            // sustituto = codigo del transportista
            // indice = 2 (transportista)
            // doc = objfactura[1]
            preparado(transportistaSeleccionado.codigo, 2, objfactura[1]);
            
            // Mostrar éxito y limpiar para buscar otra factura
            setTimeout(() => {
                toast.success(`✓ Transportista actualizado a: ${transportistaSeleccionado.nombre}`);
                limpiarFormulario();
            }, 500);
        });

        function limpiarFormulario() {
            // Limpiar Paso 1
            document.getElementById('leer').value = '';
            document.getElementById('transportista').textContent = '';
            document.getElementById('transportista-display').innerHTML = 
                '<span class="text-gray-400">Busca una factura para cargar esta información</span>';
            
            // Limpiar Paso 3
            inputTransportista.value = '';
            resultadosContainer.classList.add('hidden');
            infoSeleccionada.classList.add('hidden');
            transportistaSeleccionado = { codigo: null, nombre: null };
            
            // Deshabilitar Pasos 2 y 3
            deshabilitarPasos();
            inputTransportista.disabled = true;
            btnAceptar.disabled = true;
            btnCancelar.disabled = true;
            
            // Enfocar en el campo de búsqueda
            document.getElementById('leer').focus();
            
            toast.info('Formulario limpiado. Ingresa una nueva factura.');
        }

        // Cerrar dropdown al hacer clic fuera
        document.addEventListener('click', function(e) {
            if (e.target !== inputTransportista && !resultadosContainer.contains(e.target)) {
                resultadosContainer.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
