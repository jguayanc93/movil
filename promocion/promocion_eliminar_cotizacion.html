<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <title>Eliminar Promociones</title>
    <style>
        .item-card {
            @apply bg-white rounded-lg border border-gray-200 p-4 mb-3 hover:shadow-md transition-shadow;
        }
        .item-card.selected {
            @apply border-red-500 bg-red-50;
        }
        .item-card.selected input[type="checkbox"] {
            @apply accent-red-600;
        }
        .selection-badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800;
        }
        .state-empty {
            @apply flex flex-col items-center justify-center py-12 text-gray-500;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- Header Navigation -->
<nav class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">Eliminar Promociones</h1>
            <a href="/main.html" class="inline-flex items-center px-4 py-2 rounded-lg bg-gray-600 text-white font-semibold hover:bg-gray-700 transition-colors text-sm sm:text-base">
                ← Menú
            </a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="max-w-4xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
    
    <!-- Search Section -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Buscar Cotización</h2>
        <div class="space-y-4">
            <div>
                <label for="ncoti" class="block text-sm font-medium text-gray-700 mb-2">
                    Número de Cotización
                </label>
                <input 
                    type="search" 
                    name="ncoti" 
                    id="ncoti" 
                    placeholder="Ej: COT-2024-001"
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-gray-900 placeholder:text-gray-400 transition-all"
                >
            </div>
            <button 
                type="button" 
                id="buscar-coti" 
                class="w-full py-2 px-4 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
                Buscar
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Items Available Section -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 px-6 py-4">
                    <h2 class="text-lg font-semibold text-white">Items Disponibles</h2>
                    <p class="text-indigo-100 text-sm mt-1">Selecciona los items que deseas eliminar</p>
                </div>
                
                <div id="contendor-final-final" class="p-4">
                    <!-- Items will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Selected Items Section -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-lg shadow-md overflow-hidden sticky top-24">
                <div class="bg-gradient-to-r from-red-500 to-red-600 px-6 py-4">
                    <h2 class="text-lg font-semibold text-white">Resumen de Eliminación</h2>
                    <p class="text-red-100 text-sm mt-1" id="selected-count">0 items seleccionados</p>
                </div>
                
                <div id="contendor-promos-final" class="p-4">
                    <div id="selected-items-container" class="space-y-2">
                        <div class="state-empty py-8">
                            <svg class="w-12 h-12 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m0 0l8 4m-8-4v10l8 4m0-10l8-4m-8 4v10l8-4m0 0l-8-4" />
                            </svg>
                            <p class="text-center">No hay items seleccionados</p>
                        </div>
                    </div>
                    
                    <ul id="productos-cotizacion-detallada" role="list" class="space-y-2 mt-4 max-h-64 overflow-y-auto">
                        <!-- Selected items will appear here -->
                    </ul>
                </div>

                <div class="border-t border-gray-200 p-4">
                    <button 
                        type="button" 
                        id="remover-promos" 
                        disabled
                        class="w-full py-3 px-4 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-red-600"
                    >
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                            Eliminar Seleccionados
                        </span>
                    </button>
                    <button 
                        type="button" 
                        id="limpiar-seleccion" 
                        class="w-full mt-2 py-2 px-4 rounded-lg bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2"
                    >
                        Limpiar Selección
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Aceptacion -->
<div id="modal-aceptacion" class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true"></div>

<!-- Scripts de enrutamiento y variables globales -->
<script src="/caminos/rutas.js"></script>
<script src="/js/global/variables.js"></script>

<!-- Funciones mejoradas para la interfaz -->
<script>
    // Función mejorada para actualizar el contador de seleccionados
    function updateSelectedCount() {
        const count = promos_recojidas.length;
        const countElement = document.getElementById('selected-count');
        const removeButton = document.getElementById('remover-promos');
        const clearButton = document.getElementById('limpiar-seleccion');
        
        countElement.textContent = `${count} ${count === 1 ? 'item' : 'items'} seleccionado${count !== 1 ? 's' : ''}`;
        removeButton.disabled = count === 0;
        clearButton.disabled = count === 0;
        
        // Actualizar visual de contenedor vacío
        const container = document.getElementById('selected-items-container');
        if (count === 0) {
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
        }
    }

    // Función mejorada para limpiar la selección
    function clearSelection() {
        promos_recojidas = [];
        document.getElementById('productos-cotizacion-detallada').innerHTML = '';
        
        // Resetear botones de items
        document.querySelectorAll('[id^="seleccion-item-"]').forEach(btn => {
            btn.textContent = btn.dataset.originalText || btn.textContent;
            btn.disabled = false;
            btn.className = 'font-medium text-indigo-600 hover:text-indigo-500';
        });
        
        updateSelectedCount();
    }

    // Event listener para limpiar selección
    document.getElementById('limpiar-seleccion')?.addEventListener('click', clearSelection);
</script>

<!-- Scripts de funcionalidad -->
<script src="/js/promos/buscar_promocion.js"></script>
<script src="/js/promos/recolectar_promocion.js"></script>
<script src="/js/promos/promo_remover.js"></script>

<!-- Script de mejoras visuales para items -->
<script>
    // Guardar referencia a la función original de recojedor_promocion
    const originalRecojedor = window.recojedor_promocion;
    
    // Reemplazar con versión mejorada
    window.recojedor_promocion = async function(doc, nitem, descr) {
        await originalRecojedor(doc, nitem, descr);
        updateSelectedCount();
        
        // Actualizar lista de seleccionados
        setTimeout(() => {
            promocion_desechadas();
        }, 100);
    }

    // Guardar la función original y reemplazarla
    const originalPromocionDesechadas = window.promocion_desechadas;
    window.promocion_desechadas = async function() {
        try {
            document.getElementById("productos-cotizacion-detallada").innerHTML = "";
            
            for (let indice of promos_recojidas) {
                let listItem = document.createElement('li');
                listItem.className = 'fade-in flex items-start justify-between p-3 bg-red-50 border border-red-200 rounded-lg';
                listItem.innerHTML = `
                    <div class="flex-1">
                        <p class="font-medium text-gray-900 text-sm">${indice[2]}</p>
                        <p class="text-xs text-gray-600 mt-1">Fila: <span class="font-semibold">${indice[1]}</span></p>
                    </div>
                    <button 
                        type="button" 
                        class="ml-2 p-1 text-red-600 hover:text-red-800 hover:bg-red-100 rounded"
                        onclick="removeSelectedItem(${promos_recojidas.indexOf(indice)}, '${indice[1]}')"
                        title="Remover de la selección"
                    >
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                document.getElementById("productos-cotizacion-detallada").appendChild(listItem);
            }
        }
        catch(err) { 
            console.error('Error en promocion_desechadas:', err); 
        }
    }

    // Función para remover un item individual
    window.removeSelectedItem = function(index, nitem) {
        promos_recojidas.splice(index, 1);
        
        // Resetear botón del item
        const btn = document.getElementById(`seleccion-item-${nitem}`);
        if (btn) {
            btn.textContent = `Eliminar ${nitem}`;
            btn.disabled = false;
            btn.className = 'font-medium text-indigo-600 hover:text-indigo-500';
        }
        
        updateSelectedCount();
        promocion_desechadas();
    }
</script>

</body>
</html>
