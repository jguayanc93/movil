<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cambiar almacén de cotización - CDK Sistema de Gestión de Ventas">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CDK - Cambiar Almacén</title>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  
  <!-- HEADER/NAVBAR -->
  <nav class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-3">
          <h1 class="text-xl font-bold text-indigo-600">CDK</h1>
          <span class="text-sm text-gray-600">Cambiar Almacén</span>
        </div>
        <a href="/main.html" 
        class="flex items-center justify-center space-x-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700 transition-colors">
          <i class="fas fa-home"></i>
          <span>Menú</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTAINER -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- PASO 1: BUSCAR COTIZACION -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-6 border-l-4 border-indigo-600">
      <div class="flex items-center mb-4">
        <div class="flex items-center justify-center w-8 h-8 bg-indigo-600 text-white rounded-full font-bold text-sm">1</div>
        <h2 class="ml-3 text-xl font-bold text-gray-900">
          <i class="fas fa-search mr-2 text-indigo-600"></i>
          Buscar Cotización
        </h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="busqueda" class="block text-sm font-medium text-gray-700 mb-2">
            Número de Cotización
          </label>
          <div class="relative">
            <i class="fas fa-file-invoice absolute left-3 top-3 text-gray-400"></i>
            <input type="number" name="busqueda" id="busqueda" 
            class="w-full pl-10 pr-4 py-2.5 rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-900 transition-colors focus:border-indigo-500 focus:bg-white focus:outline-none placeholder:text-gray-400"
            placeholder="Ingrese número...">
          </div>
        </div>
        <div>
          <label for="alm" class="block text-sm font-medium text-gray-700 mb-2">
            Nuevo Almacén
          </label>
          <select id="alm" name="alm" 
          class="w-full px-4 py-2.5 rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-900 transition-colors focus:border-indigo-500 focus:bg-white focus:outline-none">
            <option value="01">🏪 PRINCIPAL</option>
            <option value="08">📦 M&M</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CONTENEDOR DE SUGERENCIAS -->
    <div id="recorrer-clientes" class="mb-6 space-y-2"></div>

    <!-- MODAL DE ACEPTACION -->
    <div id="modal-aceptacion" class="relative z-10"></div>

    <!-- CONTENEDOR DE PRODUCTOS -->
    <div id="recorrer-productos" class="mb-6"></div>

    <!-- PASO 2: CAMBIAR ALMACEN -->
    <div class="bg-gradient-to-r from-orange-50 to-red-50 rounded-xl shadow-lg p-6 border-l-4 border-orange-500">
      <div class="flex items-center mb-4">
        <div class="flex items-center justify-center w-8 h-8 bg-orange-500 text-white rounded-full font-bold text-sm">2</div>
        <h2 class="ml-3 text-xl font-bold text-gray-900">
          <i class="fas fa-warehouse mr-2 text-orange-500"></i>
          Aplicar Cambio de Almacén
        </h2>
      </div>
      <div class="space-y-4">
        <div class="p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded">
          <p class="text-sm text-yellow-800">
            <i class="fas fa-exclamation-triangle mr-2"></i>
            <strong>Advertencia:</strong> Solo puede cambiar el almacén de cotizaciones que aún no hayan sido aprobadas. Este cambio afectará la disponibilidad de productos.
          </p>
        </div>
        <button id="cambio" 
        class="w-full flex items-center justify-center space-x-2 rounded-lg bg-gradient-to-r from-orange-500 to-red-500 px-6 py-3 text-lg font-bold text-white hover:from-orange-600 hover:to-red-600 transition-all transform hover:scale-105 active:scale-95 shadow-lg">
          <i class="fas fa-sync-alt"></i>
          <span>CAMBIAR ALMACÉN</span>
        </button>
      </div>
    </div>

  </main>

<script src="/js/global/variables.js"></script>
<script src="/caminos/rutas.js"></script>
<script src="/js/cotizacion/cambio_almacen.js"></script>
<script src="/js/funciones/coti_cambiar_almacen.js"></script>
</body>
</html>
