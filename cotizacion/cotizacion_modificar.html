<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modificar cotización - CDK Sistema de Gestión de Ventas">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CDK - Modificar Cotización</title>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  
  <!-- HEADER/NAVBAR -->
  <nav class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-3">
          <h1 class="text-xl font-bold text-indigo-600">CDK</h1>
          <span class="text-sm text-gray-600">Modificar Cotización</span>
        </div>
        <a href="/main.html" 
        class="flex items-center justify-center space-x-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700 transition-colors">
          <i class="fas fa-home"></i>
          <span>Menú</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTAINER -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- PASO 1: BUSCAR COTIZACI ÓN -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-6 border-l-4 border-indigo-600">
      <div class="flex items-center mb-4">
        <div class="flex items-center justify-center w-8 h-8 bg-indigo-600 text-white rounded-full font-bold text-sm">1</div>
        <h2 class="ml-3 text-xl font-bold text-gray-900">
          <i class="fas fa-search mr-2 text-indigo-600"></i>
          Buscar Cotización
        </h2>
      </div>
      <form class="space-y-4">
        <div>
          <label for="ncoti" class="block text-sm font-medium text-gray-700 mb-2">
            Número de Cotización
          </label>
          <input type="search" name="ncoti" id="ncoti" 
          class="w-full px-4 py-2.5 rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-900 transition-colors focus:border-indigo-500 focus:bg-white focus:outline-none placeholder:text-gray-400"
          placeholder="Ej: 001234">
        </div>
        <button type="button" 
        id="buscar-coti" 
        class="w-full flex items-center justify-center space-x-2 rounded-lg bg-indigo-600 px-4 py-2.5 text-lg font-semibold text-white hover:bg-indigo-700 transition-colors">
          <i class="fas fa-magnifying-glass"></i>
          <span>BUSCAR</span>
        </button>
      </form>
    </div>

    <!-- PASO 2: TABLA DE ITEMS -->
    <div id="contendor-final-final" class="mb-6"></div>

    <!-- PASO 3: AGREGAR NUEVOS PRODUCTOS -->
    <div id="contendor-promos-final" class="bg-white rounded-xl shadow-lg overflow-hidden mb-6">
      <div class="bg-gradient-to-r from-green-600 to-green-700 px-6 py-4 text-white">
        <h2 class="text-lg font-bold flex items-center">
          <i class="fas fa-plus-circle mr-2"></i>
          Agregar Nuevos Productos
        </h2>
      </div>
      
      <div class="p-6">
        <!-- BUSCAR NUEVO PRODUCTO -->
        <div id="cotimodificar-buscarnuevoproducto" class="mb-6"></div>

        <!-- CONTENEDOR DE PRODUCTOS ENCONTRADOS -->
        <div id="encontrar">
          <div class="relative" id="recorrer-productos"></div>
        </div>
      </div>
    </div>

    <!-- PASO 4: ACCIONES FINALES -->
    <div class="bg-gradient-to-r from-orange-50 to-red-50 rounded-xl shadow-lg p-6 border-l-4 border-orange-500 mb-6">
      <div class="flex items-center mb-4">
        <div class="flex items-center justify-center w-8 h-8 bg-orange-500 text-white rounded-full font-bold text-sm">2</div>
        <h2 class="ml-3 text-xl font-bold text-gray-900">
          <i class="fas fa-check-circle mr-2 text-orange-500"></i>
          Crear Modificación
        </h2>
      </div>
      <div class="space-y-4">
        <div class="p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded">
          <p class="text-sm text-yellow-800">
            <i class="fas fa-info-circle mr-2"></i>
            <strong>Nota:</strong> Solo puede modificar cotizaciones que aún no hayan sido aprobadas.
          </p>
        </div>
        <button type="button" 
        id="crear-modificacion" 
        class="w-full flex items-center justify-center space-x-2 rounded-lg bg-gradient-to-r from-orange-500 to-red-500 px-6 py-3 text-lg font-bold text-white hover:from-orange-600 hover:to-red-600 transition-all transform hover:scale-105 active:scale-95 shadow-lg">
          <i class="fas fa-sync-alt"></i>
          <span>CREAR MODIFICACIÓN</span>
        </button>
      </div>
    </div>

    <!-- MODAL DE ACEPTACION -->
    <div id="modal-aceptacion" class="relative z-10"></div>

  </main>


<script src="/js/global/variables.js"></script>
<script src="/caminos/rutas.js"></script>
<script src="/js/cotizacion/modificar_cotizacion.js"></script>
<script src="/js/cotizacion/crear_modificacion.js"></script>
<script src="/js/funciones/coti_modi.js"></script>
</body>
</html>
