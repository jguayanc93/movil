<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - CDK</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .log-item { font-family: monospace; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        .warning { color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">🧪 Test de Conexión API</h1>
        <p class="text-gray-400 mb-6">⚠️ Asegúrate de acceder desde: <strong>http://127.0.0.1/demo1/test-api.html</strong></p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Estado de APIs</h2>
                <div id="status-container" class="space-y-2"></div>
            </div>
            
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Controles</h2>
                <div class="space-y-2">
                    <button onclick="testVendedor()" class="w-full bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded transition-colors">
                        Test /vendedor
                    </button>
                    <button onclick="testLogin()" class="w-full bg-green-600 hover:bg-green-700 px-4 py-2 rounded transition-colors">
                        Test /login
                    </button>
                    <button onclick="clearLogs()" class="w-full bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded transition-colors">
                        Limpiar Logs
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-xl font-semibold mb-4">📋 Logs de Respuesta</h2>
            <div id="logs" class="bg-gray-900 p-4 rounded max-h-96 overflow-y-auto space-y-1">
                <div class="log-item info">[INICIANDO] Sistema de pruebas listo...</div>
                <div class="log-item warning">[INFO] Usa 127.0.0.1, NO localhost</div>
            </div>
        </div>
    </div>

    <script src="./caminos/rutas.js"></script>
    <script>
        const logsContainer = document.getElementById('logs');
        const statusContainer = document.getElementById('status-container');

        // Registrar un log
        function addLog(message, type = 'info') {
            const logItem = document.createElement('div');
            logItem.className = `log-item ${type}`;
            const timestamp = new Date().toLocaleTimeString('es-ES');
            logItem.textContent = `[${timestamp}] ${message}`;
            logsContainer.appendChild(logItem);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // Limpiar logs
        function clearLogs() {
            logsContainer.innerHTML = '';
            addLog('Logs limpiados', 'info');
        }

        // Test de /vendedor
        async function testVendedor() {
            addLog('🔄 Iniciando petición a /vendedor...', 'info');
            addLog(`URL: ${rutavendedor}`, 'info');

            try {
                const response = await fetch(rutavendedor, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                addLog(`📤 Response Status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    const data = await response.json();
                    addLog('✅ Respuesta JSON recibida', 'success');
                    addLog(`Datos: ${JSON.stringify(data, null, 2)}`, 'success');
                    
                    // Verificar estructura
                    const keys = Object.keys(data);
                    addLog(`✅ Módulos disponibles: ${keys.join(', ')}`, 'success');
                    addLog(`✅ Total de módulos: ${keys.length}`, 'success');
                } else {
                    const text = await response.text();
                    addLog(`❌ Error: ${text}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Error de conexión: ${error.message}`, 'error');
                addLog('⚠️ Verifica que:', 'warning');
                addLog('   1. El API esté corriendo en http://127.0.0.1:3000', 'warning');
                addLog('   2. Accedas desde http://127.0.0.1/demo1/ (NO localhost)', 'warning');
                addLog('   3. El navegador permita CORS', 'warning');
            }
        }

        // Test de /login (simular)
        async function testLogin() {
            addLog('🔄 Iniciando petición de prueba a /login...', 'info');
            addLog(`URL: ${rutalogin}`, 'info');

            const testData = new FormData();
            testData.append('cuenta', 'test_user');
            testData.append('pass', 'test_pass');

            try {
                const response = await fetch(rutalogin, {
                    method: 'POST',
                    mode: 'cors',
                    credentials: 'include',
                    body: testData
                });

                addLog(`📤 Response Status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    const data = await response.json();
                    addLog('✅ Login response recibido', 'success');
                    addLog(`Datos: ${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    addLog('⚠️ Login falló (esperado en test)', 'warning');
                    const text = await response.text();
                    addLog(`Respuesta: ${text}`, 'info');
                }
            } catch (error) {
                addLog(`❌ Error de conexión: ${error.message}`, 'error');
            }
        }

        // Verificar estado del API al cargar
        async function checkAPIStatus() {
            addLog('🔍 Verificando estado de APIs...', 'info');

            // Test desarrollo
            try {
                const devCheck = await fetch('http://127.0.0.1:3000/v1/vendedor', {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include'
                }).catch(() => null);

                const devStatus = document.createElement('div');
                devStatus.className = 'p-3 rounded bg-gray-700 mb-2';
                
                if (devCheck) {
                    devStatus.innerHTML = '<span class="success">✅</span> API (127.0.0.1:3000): <strong>ACTIVO</strong>';
                    addLog('✅ API está ACTIVO en http://127.0.0.1:3000', 'success');
                } else {
                    devStatus.innerHTML = '<span class="error">❌</span> API (127.0.0.1:3000): <strong>INACTIVO</strong>';
                    addLog('❌ API NO está disponible en http://127.0.0.1:3000', 'error');
                    addLog('Inicia el backend con tu servidor Node.js', 'warning');
                }
                statusContainer.appendChild(devStatus);
            } catch (error) {
                addLog(`Error al verificar API: ${error.message}`, 'error');
            }
        }

        // Ejecutar verificación al cargar
        window.addEventListener('load', () => {
            setTimeout(checkAPIStatus, 500);
        });
    </script>
</body>
</html>
